server:
  port: ${TRAINING_API_PORT:8190}

spring:
  application:
    name: oj-training-data-manager
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/oj_training_data?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:oj_training}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: Asia/Shanghai

app:
  operation-password: ${TRAINING_OPERATION_PASSWORD:}

logging:
  level:
    root: info
    com.ojtraining.manager: info

platform:
  training-data:
    collector:
      job-item-interval: ${TRAINING_JOB_ITEM_INTERVAL:4s}
      schedules:
        - name: codeforces-daily-one-hundred-hours
          oj-name: CODEFORCES
          enabled: ${TRAINING_CODEFORCES_DAILY_COLLECTION_ENABLED:false}
          cron: "0 0 0 * * *"
          zone: Asia/Shanghai
          lookback: ${TRAINING_DAILY_COLLECTION_LOOKBACK:100h}
        - name: codeforces-half-hour-no-overlap
          oj-name: CODEFORCES
          enabled: ${TRAINING_CODEFORCES_INTRADAY_COLLECTION_ENABLED:false}
          cron: "0 0,30 1-23 * * *"
          zone: Asia/Shanghai
          lookback: ${TRAINING_INTRADAY_COLLECTION_LOOKBACK:0h}
        - name: atcoder-daily-one-hundred-hours
          oj-name: ATCODER
          enabled: ${TRAINING_ATCODER_DAILY_COLLECTION_ENABLED:false}
          cron: "0 15 0 * * *"
          zone: Asia/Shanghai
          lookback: ${TRAINING_DAILY_COLLECTION_LOOKBACK:100h}
        - name: atcoder-half-hour-no-overlap
          oj-name: ATCODER
          enabled: ${TRAINING_ATCODER_INTRADAY_COLLECTION_ENABLED:false}
          cron: "0 15,45 1-23 * * *"
          zone: Asia/Shanghai
          lookback: ${TRAINING_INTRADAY_COLLECTION_LOOKBACK:0h}
    atcoder:
      problem-list-collector:
        enabled: ${TRAINING_ATCODER_PROBLEM_LIST_SCHEDULE_ENABLED:false}
        bootstrap-on-startup: ${TRAINING_ATCODER_PROBLEM_LIST_BOOTSTRAP_ENABLED:false}
